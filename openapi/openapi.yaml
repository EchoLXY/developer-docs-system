openapi: 3.0.0
info:
  title: Order Management API
  description: API documentation for order creation and management system
  version: 1.0.0

servers:
  - url: https://api.example.com

paths:
  /orders:
    post:
      summary: Create Order
      description: Creates a new order in the system
      tags:
        - Orders
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
                - items
                - total_price
              properties:
                user_id:
                  type: string
                  example: "12345"
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      product_id:
                        type: string
                        example: "A001"
                      quantity:
                        type: integer
                        example: 2
                total_price:
                  type: number
                  example: 49.99
      responses:
        "200":
          description: Order successfully created
          content:
            application/json:
              schema:
                type: object
                properties:
                  order_id:
                    type: string
                    example: "ORD-001"
                  status:
                    type: string
                    example: "created"
        "400":
          description: Invalid request parameters
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Invalid request parameters"

  /orders/{id}:
    get:
      summary: Get Order
      description: Retrieve order details by ID
      tags:
        - Orders
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Order ID
      responses:
        "200":
          description: Order retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  order_id:
                    type: string
                  status:
                    type: string
        "404":
          description: Order not found

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
